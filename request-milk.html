<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMBMS | Request Milk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        /* Base Styles */
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            color: #2d3748; 
            line-height: 1.5; 
            background-color: #a7cced; 
        }
        .form-section { 
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        .container .card {
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            border-radius: 0.5rem !important;
        }
        
        /* Form Layout */
        fieldset { border: 1px solid #e2e8f0; border-radius: 6px; padding: 1.5rem; margin-bottom: 1.5rem; }
        legend { font-weight: bold; color: #1E293B; padding: 0 5px; } /* Updated color */
        .form-row-3, .form-row-2 { display: flex; gap: 1rem; margin-bottom: 1rem; }
        .form-row-3 > .form-group, .form-row-2 > .form-group { flex: 1; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.5rem; border: 1px solid #cbd5e0; border-radius: 4px; box-sizing: border-box; }
        .checkbox-group label { display: block; margin-bottom: 0.5rem; font-weight: normal; }
        .btn-primary { 
            background-color: #f0c808; 
            color: #212529; 
            padding: 0.75rem 1.5rem; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .btn-primary:hover { 
            background-color: #f0c808;
            color: #212529;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <header class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand logo" href="index.html">HMBMS</a>
            <nav class="ms-auto">
                <ul class="navbar-nav flex-row gap-3">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="form-section">
        <div class="container">
            <div class="card shadow-sm border-0 mx-auto" style="max-width: 800px;">
                <div class="card-body p-4 p-md-5">
                    <h2 class="mb-3">Request Human Milk</h2>
                    <p class="form-subtitle text-muted mb-4">Please provide your details and required medical documents below. <strong>We will send all status updates and availability alerts directly to your phone via SMS.</strong></p>
                    
                    <form id="request-form" class="standard-form">
                        
                        <!-- SECTION 1: BENEFICIARY DETAILS -->
                        <fieldset>
                            <legend class="h5 border-bottom pb-2 mb-3">Beneficiary Details</legend>
                            
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="mother_name" class="form-label">Parent/Guardian's First Name *</label>
                                    <input type="text" id="mother_name" name="mother_name" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="mother_last_name" class="form-label">Parent/Guardian's Last Name *</label>
                                    <input type="text" id="mother_name" name="mother_name" class="form-control" required>
                                </div>
                            </div>

                            <div class="row g-3 mt-1">
                                <div class="col-md-6">
                                    <label for="infant_name" class="form-label">Infant's First Name *</label>
                                    <input type="text" id="infant_name" name="infant_name" class="form-control" required>
                                </div>
                                <div class="col-md-6 d-flex align-items-center">
                                    <div class="col-md-6">
                                        <label for="infant_name" class="form-label">Infant's Last Name *</label>
                                        <input type="text" id="infant_name" name="infant_name" class="form-control" required>
                                    </div>
                                </div>
                            </div>

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="contact_number" class="form-label">Contact Number (For SMS) *</label>
                                    <input type="tel" id="contact_number" name="contact_number" class="form-control" placeholder="e.g., 09123456789" required>
                                </div>
                                <div class="col-md-6 d-flex align-items-center">
                                    <div class="form-check mt-md-4">
                                        <input type="checkbox" id="is_nicu" name="is_nicu" class="form-check-input">
                                        <label class="form-check-label" for="is_nicu">Infant currently admitted to NICU?</label>
                                    </div>
                                </div>
                            </div>
                        </fieldset>

                        <!-- SECTION 2: MEDICAL DETAILS (Milk Type Removed) -->
                        <fieldset class="mt-4">
                            <legend class="h5 border-bottom pb-2 mb-3">Medical Details</legend>
                            
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="requested_volume" class="form-label">Requested Volume (mL per day) *</label>
                                    <input type="number" id="requested_volume" name="requested_volume" class="form-control" placeholder="e.g., 150" min="1" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="medical_diagnosis" class="form-label">Medical Diagnosis *</label>
                                    <input type="text" id="medical_diagnosis" name="medical_diagnosis" class="form-control" placeholder="e.g., Prematurity, Sepsis" required>
                                </div>
                            </div>
                        </fieldset>

                        <!-- Required documents removed -->

                        <button type="submit" class="btn btn-primary w-100 mt-4 py-2 fw-bold">Submit Request & Documents</button>
                        <p id="form-message" class="text-center mt-3 fw-bold"></p>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- FIREBASE MODULE -->
    <script type="module">
        import { auth, db } from './assets/js/firebase-config.js';
        import { signInAnonymously } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js';
        import { collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js';
        const form = document.getElementById('request-form');
        const messageBox = document.getElementById('form-message');

        function buildFormDetails(formData, formElement) {
            const formDetails = {};

            for (const [key, value] of formData.entries()) {
                if (value instanceof File) continue;
                const field = formElement.elements.namedItem(key);
                if (field?.type === 'checkbox') {
                    formDetails[key] = formData.getAll(key).length > 0;
                } else {
                    formDetails[key] = value;
                }
            }

            return formDetails;
        }

        form.addEventListener('submit', async function (event) {
            event.preventDefault();

            messageBox.textContent = 'Submitting request...';
            messageBox.className = 'text-center mt-3 fw-bold text-secondary';

            const submitBtn = form.querySelector('button[type="submit"]');
            if (submitBtn) submitBtn.disabled = true;

            try {
                if (!auth.currentUser) {
                    await signInAnonymously(auth);
                }

                const formData = new FormData(form);
                const formDetails = buildFormDetails(formData, form);

                const payload = {
                    record_type: 'milk_request',
                    application_type: 'beneficiary_request',
                    status: 'Pending',
                    source: 'public-request',
                    created_at: serverTimestamp(),
                    updated_at: serverTimestamp(),
                    submitted_by: auth.currentUser?.uid || null,
                    mother_name: formDetails.mother_name || '',
                    contact_number: formDetails.contact_number || '',
                    infant_name: formDetails.infant_name || '',
                    is_nicu: Boolean(formDetails.is_nicu),
                    requested_volume: Number(formDetails.requested_volume) || 0,
                    medical_diagnosis: formDetails.medical_diagnosis || '',
                    medical_notes: formDetails.medical_notes || '',
                    form_details: formDetails,
                    request_summary: `${formDetails.infant_name || 'Infant'} • ${formDetails.medical_diagnosis || 'No diagnosis'}`
                };

                await addDoc(collection(db, 'Milk_Inquiries'), payload);

                messageBox.textContent = 'Request received and added to the HMBMS staff portal.';
                messageBox.className = 'text-center mt-3 fw-bold text-success';
                form.reset();
            } catch (error) {
                console.error('Request submission failed:', error);
                const message = error?.code === 'permission-denied'
                    ? 'Firebase permissions are blocking the submission. Check your Firestore/Storage security rules.'
                    : error?.message || 'Submission failed. Please try again later.';

                messageBox.textContent = message;
                messageBox.className = 'text-center mt-3 fw-bold text-danger';
            } finally {
                if (submitBtn) submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>

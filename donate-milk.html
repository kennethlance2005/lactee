<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMBMS | Donate Milk</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">HMBMS</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="request-milk.html">Request Milk</a></li>
                <li><a href="status-check.html">Check Request Status</a></li>
            </ul>
        </nav>
    </header>

    <section class="form-section">
        <div class="form-container">
            <h2>Become a Mother-Donor</h2>
            <p class="form-subtitle">Your donation can save lives. Please complete this preliminary screening form. A temporary Application ID will be generated for your hospital lab screening.</p>
            
            <form id="donor-form" action="/submit-donor-profile" method="POST" class="standard-form">
                
                <fieldset>
                    <legend>Personal Details</legend>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="first_name">First Name</label>
                            <input type="text" id="first_name" name="first_name" required>
                        </div>
                        <div class="form-group">
                            <label for="last_name">Last Name</label>
                            <input type="text" id="last_name" name="last_name" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="contact_number">Contact Number (For SMS Alerts)</label>
                            <input type="tel" id="contact_number" name="contact_number" placeholder="e.g., 09123456789" required>
                        </div>
                        <div class="form-group">
                            <label for="infant_age">Age of your infant (Months)</label>
                            <input type="number" id="infant_age" name="infant_age" min="0" required>
                        </div>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Health Screening Summary</legend>
                    
                    <div class="form-group full-width">
                        <label for="health_profile_summary">Medical History & Current Medications</label>
                        <textarea id="health_profile_summary" name="health_profile_summary" rows="4" placeholder="Please list any ongoing medical conditions, recent illnesses, or medications you are currently taking..." required></textarea>
                    </div>

                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="screening_consent" name="screening_consent" required>
                        <label for="screening_consent">I consent to a physical laboratory screening at the milk bank facility to finalize my donor registration.</label>
                    </div>
                </fieldset>

                <button type="submit" class="btn-primary btn-full">Submit Application</button>
                <p id="donor-form-message" class="form-subtitle" style="margin-top: 1rem;"></p>
            </form>
        </div>
    </section>

    <script>
        const donorForm = document.getElementById('donor-form');
        const donorMessage = document.getElementById('donor-form-message');

        donorForm.addEventListener('submit', async function (event) {
            event.preventDefault();
            const formData = new FormData(donorForm);
            const payload = Object.fromEntries(formData.entries());

            donorMessage.textContent = 'Submitting donor application...';
            donorMessage.style.color = '#4a5568';

            try {
                const response = await fetch('/submit-donor-profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.success) {
                    donorMessage.textContent = 'Application received. We will contact you after screening.';
                    donorMessage.style.color = '#2f855a';
                    donorForm.reset();
                } else {
                    donorMessage.textContent = result.message || 'Submission failed.';
                    donorMessage.style.color = '#c53030';
                }
            } catch (error) {
                donorMessage.textContent = 'Submission failed. Please try again later.';
                donorMessage.style.color = '#c53030';
            }
        });
    </script>
</body>
</html>
